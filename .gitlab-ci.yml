stages:
  - validate
  - build
  - image
  - deploy

variables:
  NODE_VERSION: '24.14.0'
  NPM_VERSION: '11.6.0'
  NPM_CONFIG_CACHE: '$CI_PROJECT_DIR/.npm'

.node_job:
  image: node:${NODE_VERSION}-alpine
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  before_script:
    - npm install --global npm@${NPM_VERSION}
    - npm config set registry https://registry.npmjs.org/
    - npm ci --cache .npm --prefer-offline --include=dev --no-audit --no-fund

validate:
  extends: .node_job
  stage: validate
  script:
    - npm run format:check
    - npm run type-check
    - npm test

build:
  extends: .node_job
  stage: build
  script:
    - npm run build-only
  artifacts:
    expire_in: 7 days
    paths:
      - dist/

container_image:
  stage: image
  image: docker:28-cli
  services:
    - name: docker:28-dind
      command: ['--tls=false']
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ''
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build --pull -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG"
  rules:
    - if: '$CI_COMMIT_BRANCH'

.deploy_template:
  stage: deploy
  image: alpine:3.22
  before_script:
    - apk add --no-cache openssh-client bash curl
    - install -m 700 -d ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "$DEPLOY_USER@$DEPLOY_HOST" \
        "podman login '$CI_REGISTRY' -u '$CI_REGISTRY_USER' -p '$CI_REGISTRY_PASSWORD' && \
         IMAGE='$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA' \
         CONTAINER_NAME='${CONTAINER_NAME:-aims-frontend}' \
         FRONTEND_PORT='${FRONTEND_PORT:-3000}' \
         APP_NAME='${APP_NAME:-AIMS}' \
         APP_FULL_NAME='${APP_FULL_NAME:-Aset & Inventory Management System}' \
         API_BASE_URL='$API_BASE_URL' \
         API_TIMEOUT='${API_TIMEOUT:-30000}' \
         bash -s" < scripts/deploy-podman.sh

deploy_production:
  extends: .deploy_template
  environment:
    name: production
    url: https://inventory.appbarsartama.id
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
